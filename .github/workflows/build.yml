name: Compile Complete Patched Microsoft AMCap Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Your Repository Variables
      uses: actions/checkout@v4

    - name: Clone Authentic Microsoft Samples Repository
      run: |
        git clone --depth 1 https://github.com/microsoft/Windows-classic-samples.git
      shell: cmd

    - name: Setup MSVC Compiler Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Pre-Compile BaseClasses Dependency Engine
      run: |
        cd Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        nmake /f makefile
      shell: cmd

    - name: Execute Full Verification and Python Patching
      run: |
        python patch_amcap.py
      shell: cmd

    - name: Compile Official AMCap Executable with All Configurations
      run: |
        cd Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\capture\amcap
        
        :: Set up include paths to reference the BaseClasses we compiled
        set INCLUDE=%INCLUDE%;D:\a\amcap-fullscreen\amcap-fullscreen\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        set LIB=%LIB%;D:\a\amcap-fullscreen\amcap-fullscreen\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses\Release_x64
        
        nmake /f makefile
      shell: cmd

    - name: Upload Complete Patched Production Binary
      uses: actions/upload-artifact@v4
      with:
        name: native-patched-amcap-engine
        path: Windows-classic-samples/Samples/Win7Samples/multimedia/directshow/capture/amcap/Release_x64/amcap.exe
