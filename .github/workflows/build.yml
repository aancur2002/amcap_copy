name: Compile Complete Patched Microsoft AMCap Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Your Repository
      uses: actions/checkout@v4

    # FIX: Configured sparse-checkout to recursively pull all headers (*), matching everything in the path
    - name: Fast Sparse Clone Microsoft Samples
      run: |
        git clone --depth 1 --filter=blob:none --sparse https://github.com/microsoft/Windows-classic-samples.git
        cd Windows-classic-samples
        git sparse-checkout init --cone
        git sparse-checkout set Samples/Win7Samples/multimedia/directshow/baseclasses Samples/Win7Samples/multimedia/directshow/common Samples/Win7Samples/multimedia/directshow/capture/amcap
      shell: cmd

    - name: Execute Full Verification and Python Patching
      run: |
        python patch_amcap.py
      shell: cmd

    - name: Setup MSVC & MSBuild Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Pre-Compile BaseClasses Dependency Engine
      run: |
        cd Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        cl /nologo /O2 /c /D_AMD64_ /DUNICODE /D_UNICODE /I. *.cpp
        lib /nologo /OUT:STRMBASE.lib *.obj
      shell: cmd

    - name: Compile Official AMCap via MSBuild Engine
      run: |
        cd Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\capture\amcap
        
        :: Map dependencies including the baseclasses library, local workspace headers, and the missing shared common utilities folder
        set INCLUDE=%INCLUDE%;${{ github.workspace }}\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        set INCLUDE=%INCLUDE%;${{ github.workspace }}\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\common
        set LIB=%LIB%;${{ github.workspace }}\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        
        :: Compile resource file targeting the explicit patched workspace pathing directly
        rc /fo amcap.res /d UNICODE /d _UNICODE /I. /I"${{ github.workspace }}\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses" /I"${{ github.workspace }}\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\capture\amcap" amcap.rc
        
        :: Compile and link everything together cleanly into a standalone executable
        cl /nologo /O2 /DUNICODE /D_UNICODE /D_AMD64_ /EHsc amcap.cpp status.cpp crossbar.cpp SampleCGB.cpp amcap.res /link STRMBASE.lib user32.lib gdi32.lib ole32.lib oleaut32.lib strmiids.lib uuid.lib vfw32.lib winmm.lib comctl32.lib /OUT:amcap.exe /SUBSYSTEM:WINDOWS
      shell: cmd

    - name: Upload Complete Patched Production Binary
      uses: actions/upload-artifact@v4
      with:
        name: native-patched-amcap-engine
        path: Windows-classic-samples/Samples/Win7Samples/multimedia/directshow/capture/amcap/amcap.exe
