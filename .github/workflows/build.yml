name: Compile Complete Patched Microsoft AMCap Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Your Repository
      uses: actions/checkout@v4

    - name: Fast Sparse Clone Microsoft Samples
      run: |
        git clone --depth 1 --filter=blob:none --sparse https://github.com/microsoft/Windows-classic-samples.git
        cd Windows-classic-samples
        git sparse-checkout set Samples/Win7Samples/multimedia/directshow
      shell: cmd

    - name: Setup MSVC & MSBuild Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Pre-Compile BaseClasses Dependency Engine
      run: |
        cd Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        :: Fallback raw compilation guarantees STRMBASE.lib is generated quickly
        cl /nologo /O2 /c /D_AMD64_ /DUNICODE /D_UNICODE *.cpp
        lib /nologo /OUT:STRMBASE.lib *.obj
      shell: cmd

    - name: Execute Full Verification and Python Patching
      run: |
        python patch_amcap.py
      shell: cmd

    - name: Compile Official AMCap via MSBuild Engine
      run: |
        cd Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\capture\amcap
        
        :: Set up compiler environment arrays explicitly for the build context
        set INCLUDE=%INCLUDE%;${{ github.workspace }}\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        set LIB=%LIB%;${{ github.workspace }}\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        
        :: Run explicit CLI compilation directly targeting native Windows modules
        cl /nologo /O2 /DUNICODE /D_UNICODE /D_AMD64_ /EHsc amcap.cpp status.cpp crossbar.cpp SampleCGB.cpp amcap.rc /link STRMBASE.lib user32.lib gdi32.lib ole32.lib oleaut32.lib strmiids.lib uuid.lib vfw32.lib winmm.lib comctl32.lib /OUT:amcap.exe /SUBSYSTEM:WINDOWS
      shell: cmd

    - name: Upload Complete Patched Production Binary
      uses: actions/upload-artifact@v4
      with:
        name: native-patched-amcap-engine
        path: Windows-classic-samples/Samples/Win7Samples/multimedia/directshow/capture/amcap/amcap.exe
