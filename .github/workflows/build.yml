name: Compile Custom AMCap KVM Client
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Custom AMCap Repository
      uses: actions/checkout@v4

    - name: Fetch Microsoft DirectShow BaseClasses
      run: |
        git clone --depth 1 --filter=blob:none --sparse https://github.com/microsoft/Windows-classic-samples.git
        cd Windows-classic-samples
        git sparse-checkout set Samples/Win7Samples/multimedia/directshow/baseclasses Samples/Win7Samples/multimedia/directshow/common
      shell: cmd

    - name: Setup MSVC Compiler Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Compile DirectShow BaseClasses Engine
      run: |
        pushd Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        cl /nologo /O2 /c /D_AMD64_ /D_WIN32 /DUNICODE /D_UNICODE /D_DEBUG /DDEBUG /EHsc /Zc:wchar_t /I. *.cpp
        lib /nologo /OUT:STRMBASE.lib *.obj
        echo STRMBASE.lib built at:
        cd
      shell: cmd

    - name: Compile Custom AMCap Executable
      run: |
        set BASE_PATH=%GITHUB_WORKSPACE%\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\baseclasses
        set COMMON_PATH=%GITHUB_WORKSPACE%\Windows-classic-samples\Samples\Win7Samples\multimedia\directshow\common
        set INCLUDE=%INCLUDE%;%BASE_PATH%;%COMMON_PATH%
        set LIB=%LIB%;%BASE_PATH%

        echo === DEBUG ===
        echo BASE_PATH=%BASE_PATH%
        echo LIB=%LIB%
        dir "%BASE_PATH%\STRMBASE.lib"
        echo =============

        rc /fo amcap.res /d UNICODE /d _UNICODE /I"%BASE_PATH%" amcap.rc

        cl /nologo /O2 /DUNICODE /D_UNICODE /D_AMD64_ /D_WIN32 /D_DEBUG /DDEBUG /EHsc /Zc:wchar_t ^
          amcap.cpp status.cpp crossbar.cpp SampleCGB.cpp amcap.res ^
          /link "%BASE_PATH%\STRMBASE.lib" ^
          user32.lib gdi32.lib ole32.lib oleaut32.lib strmiids.lib uuid.lib ^
          vfw32.lib winmm.lib comctl32.lib msacm32.lib comdlg32.lib advapi32.lib ^
          /OUT:amcap.exe /SUBSYSTEM:WINDOWS
      shell: cmd

    - name: Upload Production Binary
      uses: actions/upload-artifact@v4
      with:
        name: amcap-custom-kvm-client
        path: amcap.exe
